
services:

  # Container 1: SQL Server Database
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      SA_PASSWORD: "TechMove@2026!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - glms-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P TechMove@2026! -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 15

  # Container 2: Web API Backend
  glms-backend-api:
    build:
      context: ./GLMS.API
      dockerfile: Dockerfile
    container_name: glms-backend-api
    environment:
      - ConnectionStrings__DefaultConnection=Server=sql-server-db,1433;Database=TechMoveGLMS;User Id=sa;Password=TechMove@2026!;TrustServerCertificate=True;
      - Jwt__Key=TechMoveSuperSecretKey2026ForGLMS!
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    ports:
      - "5001:80"
    depends_on:
      sql-server-db:
        condition: service_healthy
    networks:
      - glms-network
    restart: on-failure

  # Container 3: MVC Frontend
  glms-frontend-web:
    build:
      context: ./TechMovePrototype
      dockerfile: Dockerfile
    container_name: glms-frontend-web
    environment:
      - ApiBaseUrl=http://glms-backend-api/
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    ports:
      - "5000:80"
    depends_on:
      - glms-backend-api
    networks:
      - glms-network
    restart: on-failure

volumes:
  sqlserver_data:

networks:
  glms-network:
    driver: bridge